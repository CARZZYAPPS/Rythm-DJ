<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Runner - DJ Edition</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #ui-layer { text-align: center; z-index: 10; background: rgba(15,15,15,0.95); padding: 30px; border-radius: 15px; border: 1px solid #00d1b2; position: absolute; box-shadow: 0 0 30px rgba(0,209,178,0.3); min-width: 300px; }
        canvas { background: #050505; border-bottom: 4px solid #00d1b2; }
        
        .stats { position: absolute; top: 20px; left: 20px; font-size: 18px; font-weight: bold; color: #00d1b2; line-height: 1.5; }
        #best-label { color: #ffd700; font-size: 14px; transition: all 0.3s ease; }
        .record-pulse { transform: scale(1.3); text-shadow: 0 0 15px #ffd700; }
        
        .credits { margin-top: 20px; font-size: 13px; color: #666; }
        .credits a { color: #00d1b2; text-decoration: none; font-weight: bold; }
        #watermark { position: absolute; bottom: 15px; right: 20px; font-size: 12px; font-weight: bold; color: rgba(0,209,178,0.2); pointer-events: none; }

        button { padding: 12px 30px; font-size: 16px; cursor: pointer; background: #00d1b2; border: none; border-radius: 30px; color: white; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { box-shadow: 0 0 15px #00d1b2; }
        .share-btn { background: #333; font-size: 14px; display: none; }
        input[type="file"] { margin: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="stats">
        SCORE: <span id="score">0</span><br>
        <div id="best-label">BEST: <span id="best-score">0</span></div>
    </div>
    
    <div id="watermark">v1.0.0 PRO</div>

    <div id="ui-layer">
        <h1 id="title">NEON DJ RUNNER</h1>
        <p id="msg">Upload music to drop the beat!</p>
        <input type="file" id="audioUpload" accept="audio/*"><br>
        <button id="startBtn" disabled>START SESSION</button><br>
        <button id="shareBtn" class="share-btn">SHARE STATS</button>
        
        <div class="credits">
            Made By: <strong>Avi Shayowitz</strong><br>
            Questions? <a href="mailto:avishayowitz@gmail.com">Email Me</a>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audio = new Audio();
        audio.loop = true;
        
        let audioCtx, analyser, dataArray, source, animationId;
        let gameActive = false, score = 0, bestScore = localStorage.getItem('rr_best_score') || 0;
        document.getElementById('best-score').innerText = bestScore;

        let player = { x: 150, y: 0, w: 45, h: 40, dy: 0, jumpPower: -16, grounded: true };
        let beats = [], gravity = 0.85, groundY = 0;

        function resize() {
            canvas.width = window.innerWidth * 0.95;
            canvas.height = 400;
            groundY = canvas.height - 70;
            player.y = groundY - player.h;
        }
        window.onresize = resize;
        resize();

        document.getElementById('audioUpload').onchange = (e) => {
            if (e.target.files[0]) {
                audio.src = URL.createObjectURL(e.target.files[0]);
                audio.onloadedmetadata = () => { document.getElementById('startBtn').disabled = false; };
            }
        };

        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && player.grounded && gameActive) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        });

        function drawDJ(pulse) {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Helmet Body
            ctx.fillStyle = "#111";
            ctx.strokeStyle = "#00d1b2";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(0, 0, player.w, player.h, 10);
            ctx.fill();
            ctx.stroke();

            // Glowing Visor
            let visorPulse = 10 + (pulse * 0.5);
            ctx.shadowBlur = visorPulse;
            ctx.shadowColor = "#00d1b2";
            ctx.fillStyle = "#00d1b2";
            ctx.fillRect(5, 10, player.w - 10, 15);

            // Visor "Level" detail
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            let barH = (pulse / 60) * 15;
            ctx.fillRect(5, 10, player.w - 10, 15 - barH);

            ctx.restore();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let pulse = 0;
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                pulse = (dataArray[0] / 255) * 60;
            }

            if (audio.currentTime < 0.2) beats.forEach(b => b.passed = false);

            ctx.strokeStyle = "#00d1b2";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            beats.forEach(b => {
                let x = (b.time - audio.currentTime) * 350 + player.x;
                if (x > -50 && x < canvas.width + 50) {
                    ctx.fillStyle = "#00d1b2";
                    let h = 50 + pulse;
                    ctx.fillRect(x, groundY - h, 20, h);

                    if (x < player.x + player.w && x + 20 > player.x && player.y + player.h > groundY - h) gameOver();

                    if (!b.passed && x < player.x) {
                        b.passed = true;
                        score += 10;
                        document.getElementById('score').innerText = score;
                        if (score > bestScore) {
                            bestScore = score;
                            document.getElementById('best-score').innerText = bestScore;
                            document.getElementById('best-label').classList.add('record-pulse');
                        }
                    }
                }
            });

            player.dy += gravity;
            player.y += player.dy;
            if (player.y > groundY - player.h) {
                player.y = groundY - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            drawDJ(pulse);
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            audio.pause(); audio.currentTime = 0;
            localStorage.setItem('rr_best_score', bestScore);
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('title').innerText = "MIX CRASHED!";
            document.getElementById('shareBtn').style.display = 'inline-block';
            document.getElementById('best-label').classList.remove('record-pulse');
        }

        document.getElementById('shareBtn').onclick = () => {
            const shareText = `DJ Avi just scored ${score} on Rhythm Runner! Best: ${bestScore}. Beat me!`;
            navigator.clipboard.writeText(shareText).then(() => {
                document.getElementById('shareBtn').innerText = "COPIED!";
                setTimeout(() => { document.getElementById('shareBtn').innerText = "SHARE STATS"; }, 2000);
            });
        };

        document.getElementById('startBtn').onclick = () => {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser); analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            score = 0; document.getElementById('score').innerText = "0";
            document.getElementById('shareBtn').style.display = 'none';
            beats = []; let t = 3; while (t < audio.duration - 1) { beats.push({time:t, passed:false}); t += 1.6 + Math.random()*1.8; }
            document.getElementById('ui-layer').style.display = 'none';
            gameActive = true; audio.play(); update();
        };
    </script>
</body>
</html>
